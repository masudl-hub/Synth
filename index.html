<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Physics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b; /* Zinc 950 */
        color: #fafafa; /* Zinc 50 */
      }
      
      .font-display {
        font-family: 'Space Grotesk', sans-serif;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46; 
      }

      /* View Transitions for Grid Animation */
      ::view-transition-group(root) {
        animation-duration: 1.2s;
      }
      ::view-transition-group(*),
      ::view-transition-old(*),
      ::view-transition-new(*) {
        animation-duration: 1.2s;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); /* Slow, rhythmic ease-out */
      }
      
      /* Ensure clean blending */
      ::view-transition-old(*) {
        mix-blend-mode: normal;
      }
      ::view-transition-new(*) {
        mix-blend-mode: normal;
      }
    </style>
